{% extends "base.html" %}
{% block title %}Ajustes — Kuenta{% endblock %}

{% block content %}
<h4 class="fw-bold mb-4">Ajustes</h4>

<div style="max-width:480px">
  <div class="card">
    <div class="card-header fw-semibold bg-white">
      <i class="bi bi-coin me-2"></i>Capital inicial
    </div>
    <div class="card-body">
      <p class="text-muted small mb-3">
        Monto propio invertido al inicio. Se usa para calcular la ganancia neta
        en el dashboard — no afecta ningún préstamo registrado.
      </p>
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Capital inicial ($)</label>
          <input type="number" name="capital_inicial" class="form-control"
                 value="{{ capital_inicial }}" min="0" step="1000" required>
          <div class="form-text">Ejemplo: 2000000</div>
        </div>
        <button class="btn btn-primary btn-sm" type="submit">
          <i class="bi bi-check-lg me-1"></i> Guardar
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
