{% extends "base.html" %}
{% block title %}Editar — {{ p.nombre }}{% endblock %}

{% block content %}
<div class="mb-4">
  <a href="{{ url_for('detalle_prestamo', pid=p.id) }}" class="text-muted text-decoration-none">
    <i class="bi bi-arrow-left me-1"></i> Volver
  </a>
  <h4 class="fw-bold mt-2">Editar préstamo — {{ p.nombre }}</h4>
</div>

<div class="card" style="max-width:520px">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre</label>
        <input type="text" name="nombre" class="form-control" value="{{ p.nombre }}" required>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label fw-semibold">Fecha del préstamo</label>
          <input type="date" name="fecha" class="form-control" value="{{ p.fecha.isoformat() }}" required>
        </div>
        <div class="col-6">
          <label class="form-label fw-semibold">Fecha de vencimiento</label>
          <input type="date" name="fecha_vence" class="form-control" value="{{ p.fecha_vence.isoformat() if p.fecha_vence else '' }}">
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label fw-semibold">Capital ($)</label>
          <input type="number" name="capital" id="capital" class="form-control"
                 value="{{ p.capital }}" min="1000" step="1000" required>
        </div>
        <div class="col-6">
          <label class="form-label fw-semibold">Interés (%)</label>
          <input type="number" name="interes_pct" id="interes_pct" class="form-control"
                 value="{{ p.interes_pct }}" min="0" max="100" step="1">
        </div>
      </div>

      <div class="bg-light rounded p-3 mb-3 small">
        <div class="d-flex justify-content-between">
          <span>Interés:</span>
          <strong id="prev_interes"></strong>
        </div>
        <div class="d-flex justify-content-between mt-1">
          <span>Total a pagar:</span>
          <strong id="prev_total" class="text-primary fs-6"></strong>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Estado</label>
        <select name="estado" class="form-select">
          <option value="En curso" {% if p.estado == 'En curso' %}selected{% endif %}>En curso</option>
          <option value="Pagado"   {% if p.estado == 'Pagado'   %}selected{% endif %}>Pagado</option>
        </select>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Notas</label>
        <textarea name="notas" class="form-control" rows="2">{{ p.notas or '' }}</textarea>
      </div>

      <button class="btn btn-primary w-100" type="submit">
        <i class="bi bi-check-lg me-1"></i> Guardar cambios
      </button>
    </form>

    <hr class="my-4">

    <form method="post" action="{{ url_for('eliminar_prestamo', pid=p.id) }}"
          onsubmit="return confirm('¿Eliminar este préstamo y todos sus abonos? Esta acción no se puede deshacer.')">
      <button class="btn btn-outline-danger w-100" type="submit">
        <i class="bi bi-trash me-1"></i> Eliminar préstamo
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function fmt(n){ return '$' + n.toLocaleString('es-CO'); }
function calcular(){
  const cap = parseInt(document.getElementById('capital').value) || 0;
  const pct = parseFloat(document.getElementById('interes_pct').value) || 0;
  const int = Math.round(cap * pct / 100);
  document.getElementById('prev_interes').textContent = fmt(int);
  document.getElementById('prev_total').textContent   = fmt(cap + int);
}
document.getElementById('capital').addEventListener('input', calcular);
document.getElementById('interes_pct').addEventListener('input', calcular);
calcular();
</script>
{% endblock %}
