<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Préstamos{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; font-size: 0.93rem; }
    .sidebar {
      min-height: 100vh; background: #1a2340; width: 220px;
      position: fixed; top: 0; left: 0; z-index: 100;
    }
    .sidebar .brand { color: #fff; font-weight: 700; font-size: 1.1rem; padding: 1.5rem 1rem 1rem; letter-spacing:.5px; }
    .sidebar .nav-link { color: #a8b3cc; padding: .55rem 1rem; border-radius: 6px; margin: 2px 8px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #2d3f6e; color: #fff; }
    .sidebar .nav-link i { margin-right: 8px; }
    .main-content { margin-left: 220px; padding: 2rem; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .stat-card { border-left: 4px solid; }
    .stat-card.blue  { border-color: #3b82f6; }
    .stat-card.green { border-color: #22c55e; }
    .stat-card.amber { border-color: #f59e0b; }
    .stat-card.red   { border-color: #ef4444; }
    .badge-estado-pagado   { background: #dcfce7; color: #15803d; font-weight:600; }
    .badge-estado-encurso  { background: #fef3c7; color: #92400e; font-weight:600; }
    .alerta-vencido  { background: #fee2e2; }
    .alerta-hoy      { background: #fff7ed; }
    .alerta-pronto   { background: #fefce8; }
    table thead th { background: #f8fafc; font-weight: 600; font-size:.85rem; text-transform:uppercase; letter-spacing:.4px; color:#64748b; }
    .btn-primary   { background:#3b82f6; border-color:#3b82f6; }
    .btn-primary:hover { background:#2563eb; }
  </style>
</head>
<body>

<nav class="sidebar d-flex flex-column">
  <div class="brand"><i class="bi bi-currency-dollar"></i> Préstamos</div>
  <ul class="nav flex-column mt-2">
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">
        <i class="bi bi-house"></i> Inicio
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint in ['lista_prestamos','detalle_prestamo'] %}active{% endif %}" href="{{ url_for('lista_prestamos') }}">
        <i class="bi bi-people"></i> Deudores
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint=='nuevo_prestamo' %}active{% endif %}" href="{{ url_for('nuevo_prestamo') }}">
        <i class="bi bi-plus-circle"></i> Nuevo préstamo
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if request.endpoint=='reportes' %}active{% endif %}" href="{{ url_for('reportes') }}">
        <i class="bi bi-bar-chart-line"></i> Reportes
      </a>
    </li>
  </ul>
</nav>

<div class="main-content">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
