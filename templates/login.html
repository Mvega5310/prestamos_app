<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión — Préstamos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; }
    .login-card {
      max-width: 400px; margin: 100px auto;
      border: none; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    .login-header {
      background: #1a2340; color: #fff;
      border-radius: 16px 16px 0 0;
      padding: 2rem; text-align: center;
    }
    .login-header i { font-size: 2.2rem; }
    .login-header h5 { margin: .5rem 0 0; font-weight: 700; letter-spacing: .5px; }
    .btn-primary { background: #3b82f6; border-color: #3b82f6; }
    .btn-primary:hover { background: #2563eb; }
  </style>
</head>
<body>
<div class="login-card card">
  <div class="login-header">
    <i class="bi bi-currency-dollar"></i>
    <h5>Control de Préstamos</h5>
  </div>
  <div class="card-body p-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Contraseña</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-4 form-check">
        <input type="checkbox" name="remember" class="form-check-input" id="remember">
        <label class="form-check-label text-muted" for="remember">Recordarme</label>
      </div>
      <button class="btn btn-primary w-100 fw-semibold" type="submit">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
      </button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
