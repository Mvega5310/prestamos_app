<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configuración inicial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; }
    .setup-card { max-width: 440px; margin: 80px auto; border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.10); }
    .setup-header { background: #1a2340; color: #fff; border-radius: 16px 16px 0 0; padding: 2rem; text-align: center; }
    .btn-primary { background: #3b82f6; border-color: #3b82f6; }
  </style>
</head>
<body>
<div class="setup-card card">
  <div class="setup-header">
    <i class="bi bi-shield-lock" style="font-size:2rem"></i>
    <h5 class="mt-2 fw-bold">Primer acceso</h5>
    <p class="mb-0 small opacity-75">Crea el usuario administrador</p>
  </div>
  <div class="card-body p-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre completo</label>
        <input type="text" name="nombre" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre de usuario</label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contraseña</label>
        <input type="password" name="password" class="form-control" minlength="6" required>
        <div class="form-text">Mínimo 6 caracteres.</div>
      </div>
      <button class="btn btn-primary w-100 fw-semibold" type="submit">
        <i class="bi bi-check-lg me-1"></i> Crear administrador
      </button>
    </form>
  </div>
</div>
</body>
</html>
